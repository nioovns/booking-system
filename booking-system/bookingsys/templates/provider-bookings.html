<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدیریت رزروها | سامانه مدیریت خدمات</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="statics/css/style.css">
    
    <style>
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 98;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        
        .menu-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: 70px;
            height: 100vh;
            background: rgba(8, 8, 12, 0.96);
            backdrop-filter: blur(16px);
            z-index: 99;
            border-left: 1px solid rgba(255, 255, 255, 0.06);
            transition: width 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: -8px 0 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        
        .sidebar.open {
            width: 240px;
        }
        
        .sidebar-header {
            padding: 24px 0 16px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: 20px;
        }
        
        .menu-toggle-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 10px 0;
            margin: 0 12px;
            color: rgba(255, 255, 255, 0.7);
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        
        .menu-toggle-item i {
            font-size: 22px;
            width: 28px;
            text-align: center;
        }
        
        .menu-toggle-item .menu-text {
            font-size: 13px;
            font-weight: 500;
            display: none;
            letter-spacing: 0.3px;
        }
        
        .sidebar.open .menu-toggle-item {
            justify-content: flex-start;
            padding: 10px 16px;
            margin: 0 12px;
        }
        
        .sidebar.open .menu-toggle-item .menu-text {
            display: inline;
        }
        
        .menu-toggle-item:hover {
            background: rgba(255, 255, 255, 0.08);
            color: white;
        }
        
        .sidebar-menu {
            list-style: none;
            padding: 0;
        }
        
        .sidebar-menu li {
            margin: 4px 0;
        }
        
        .sidebar-menu a {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 10px 0;
            margin: 0 12px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            border-radius: 40px;
            transition: all 0.25s ease;
            white-space: nowrap;
            font-size: 14px;
            font-weight: 450;
        }
        
        .sidebar-menu a i {
            font-size: 22px;
            width: 28px;
            text-align: center;
        }
        
        .sidebar-menu a .menu-text {
            display: none;
            font-size: 13px;
        }
        
        .sidebar.open .sidebar-menu a {
            justify-content: flex-start;
            padding: 10px 16px;
            margin: 0 12px;
        }
        
        .sidebar.open .sidebar-menu a .menu-text {
            display: inline;
        }
        
        .sidebar-menu a:hover {
            background: rgba(255, 255, 255, 0.06);
            color: white;
        }
        
        .sidebar-menu a.active {
            background: rgba(37, 99, 235, 0.15);
            color: white;
        }
        
        .sidebar-menu a.active i {
            background: #2563EB;
            color: white;
            border-radius: 50%;
            padding: 6px;
            width: 34px;
            margin-right: -3px;
        }
        
        .sidebar.open .sidebar-menu a.active i {
            margin-right: 0;
        }
        
        .main-content {
            margin-right: 70px;
            padding: 24px 32px;
            min-height: 100vh;
            transition: margin-right 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .page-title {
            color: white;
            font-size: 26px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .user-name {
            color: rgba(255, 255, 255, 0.85);
            font-weight: 500;
            font-size: 14px;
        }
        
        .btn-icon {
            background: rgba(255, 255, 255, 0.06);
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
            padding: 8px 12px;
            border-radius: 30px;
            transition: all 0.2s;
        }
        
        .btn-icon:hover {
            background: rgba(255, 255, 255, 0.12);
            color: white;
        }
        
        .bookings-table-container {
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 20px;
            overflow-x: auto;
        }
        
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .table-header h2 {
            color: #1F2937;
            font-size: 18px;
            font-weight: 600;
            margin: 0;
        }
        
        .filter-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .filter-select {
            padding: 8px 16px;
            border: 1px solid #E5E7EB;
            border-radius: 30px;
            background: white;
            font-family: 'Vazirmatn';
            font-size: 13px;
            cursor: pointer;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 14px 12px;
            text-align: right;
            border-bottom: 1px solid #E5E7EB;
        }
        
        th {
            background: #F9FAFB;
            font-weight: 600;
            color: #374151;
            font-size: 14px;
        }
        
        td {
            color: #4B5563;
            font-size: 14px;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-pending {
            background: #FEF3C7;
            color: #D97706;
        }
        
        .status-confirmed {
            background: #D1FAE5;
            color: #059669;
        }
        
        .status-rejected {
            background: #FEE2E2;
            color: #DC2626;
        }
        
        .status-canceled {
            background: #F3F4F6;
            color: #6B7280;
        }
        
        .action-buttons {
            display: flex;
            gap: 8px;
        }
        
        .btn-confirm, .btn-reject {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            padding: 5px 8px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .btn-confirm {
            color: #059669;
        }
        
        .btn-confirm:hover {
            background: #D1FAE5;
        }
        
        .btn-reject {
            color: #DC2626;
        }
        
        .btn-reject:hover {
            background: #FEE2E2;
        }
        
        @media (max-width: 800px) {
            .main-content {
                margin-right: 0;
                padding: 16px;
            }
            .sidebar {
                right: -70px;
            }
            .sidebar.open {
                right: 0;
            }
            .table-header {
                flex-direction: column;
                align-items: stretch;
            }
            .filter-group {
                justify-content: space-between;
            }
            th, td {
                padding: 10px 8px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <header class="glass-header">
        <div class="header-title">پنل ارائه‌دهنده خدمات</div>
    </header>
    
    <div class="menu-overlay" id="menuOverlay"></div>
    
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="menu-toggle-item" id="menuToggleBtn">
                <i class="fas fa-bars"></i>
                <span class="menu-text">منو</span>
            </div>
        </div>
        <ul class="sidebar-menu">
            <li><a href="provider-services.html"><i class="fas fa-concierge-bell"></i><span class="menu-text"> سرویس‌ها</span></a></li>
            <li><a href="provider-timeslots.html"><i class="fas fa-clock"></i><span class="menu-text"> زمان‌بندی</span></a></li>
            <li><a href="provider-bookings.html" class="active"><i class="fas fa-calendar-check"></i><span class="menu-text"> رزروها</span></a></li>
            <li><a href="provider-profile.html"><i class="fas fa-user"></i><span class="menu-text"> پروفایل</span></a></li>
        </ul>
    </div>
    
    <div class="main-content">
        <div class="dashboard-header">
            <h1 class="page-title">مدیریت رزروها</h1>
            <div class="user-info">
                <span class="user-name" id="username">ارائه‌دهنده</span>
                <button class="btn-icon" id="profileBtn" title="پروفایل"><i class="fas fa-user-circle"></i></button>
                <button class="btn-icon" id="logoutBtn" title="خروج"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
        
        <div class="bookings-table-container">
            <div class="table-header">
                <h2><i class="fas fa-list"></i> لیست رزروهای دریافتی</h2>
                <div class="filter-group">
                    <select id="statusFilter" class="filter-select">
                        <option value="all">همه وضعیت‌ها</option>
                        <option value="pending">در انتظار</option>
                        <option value="confirmed">تایید شده</option>
                        <option value="rejected">رد شده</option>
                        <option value="canceled">لغو شده</option>
                    </select>
                </div>
            </div>
            <table id="bookingsTable">
                <thead>
                    <tr>
                        <th>مشتری</th>
                        <th>سرویس</th>
                        <th>تاریخ</th>
                        <th>ساعت</th>
                        <th>قیمت</th>
                        <th>وضعیت</th>
                        <th>عملیات</th>
                    </tr>
                </thead>
                <tbody id="bookingsTableBody">
                    <tr><td colspan="7" style="text-align: center;">در حال بارگذاری...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <script src="/static/js/api.js"></script>
    <script>
        const sidebar = document.getElementById('sidebar');
        const menuOverlay = document.getElementById('menuOverlay');
        const menuToggleBtn = document.getElementById('menuToggleBtn');
        
        function toggleMenu() {
            if (sidebar.classList.contains('open')) {
                sidebar.classList.remove('open');
                menuOverlay.classList.remove('active');
                document.body.style.overflow = '';
            } else {
                sidebar.classList.add('open');
                menuOverlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            }
        }
        
        if (menuToggleBtn) menuToggleBtn.addEventListener('click', toggleMenu);
        if (menuOverlay) menuOverlay.addEventListener('click', toggleMenu);
        
        const profileBtn = document.getElementById('profileBtn');
        if (profileBtn) {
            profileBtn.addEventListener('click', () => {
                window.location.href = 'provider-profile.html';
            });
        }
        
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', () => {
                AuthAPI.logout();
            });
        }
        
        const usernameSpan = document.getElementById('username');
        if (usernameSpan) {
            usernameSpan.innerText = localStorage.getItem('username') || 'ارائه‌دهنده';
        }
        
        const statusMap = {
            'pending': 'در انتظار',
            'confirmed': 'تایید شده',
            'rejected': 'رد شده',
            'canceled': 'لغو شده'
        };
        
        async function loadBookings() {
            try {
                const bookings = await ProviderAPI.getMyBookings();
                const filter = document.getElementById('statusFilter').value;
                
                let filteredBookings = bookings;
                if (filter !== 'all') {
                    filteredBookings = bookings.filter(b => b.status === filter);
                }
                
                if (filteredBookings && filteredBookings.length > 0) {
                    document.getElementById('bookingsTableBody').innerHTML = filteredBookings.map(booking => `
                        <tr>
                            <td>${booking.customerName}</td>
                            <td>${booking.serviceName}</td>
                            <td>${booking.date}</td>
                            <td>${booking.time || '-'}</td>
                            <td>${(booking.price || 0).toLocaleString()} تومان</td>
                            <td><span class="status-badge status-${booking.status}">${statusMap[booking.status] || booking.status}</span></td>
                            <td class="action-buttons">
                                ${booking.status === 'pending' ? `
                                    <button class="btn-confirm" onclick="updateBookingStatus(${booking.id}, 'confirmed')" title="تایید"><i class="fas fa-check-circle"></i></button>
                                    <button class="btn-reject" onclick="updateBookingStatus(${booking.id}, 'rejected')" title="رد"><i class="fas fa-times-circle"></i></button>
                                ` : `
                                    <span style="color: #9CA3AF; font-size: 12px;">غیرقابل تغییر</span>
                                `}
                            </td>
                        </tr>
                    `).join('');
                } else {
                    document.getElementById('bookingsTableBody').innerHTML = '<tr><td colspan="7" style="text-align: center;">هیچ رزروی یافت نشد</td></tr>';
                }
            } catch(err) {
                showError('خطا در بارگذاری رزروها');
                console.error(err);
            }
        }
        
        window.updateBookingStatus = async (id, status) => {
            const statusText = status === 'confirmed' ? 'تایید' : 'رد';
            if (confirm(`آیا از ${statusText} این رزرو اطمینان دارید؟`)) {
                try {
                    await ProviderAPI.updateBookingStatus(id, status);
                    showSuccess(`رزرو با موفقیت ${statusText} شد`);
                    loadBookings();
                } catch(err) {
                    showError(err.message);
                }
            }
        };
        
        document.getElementById('statusFilter').addEventListener('change', () => {
            loadBookings();
        });
        
        loadBookings();
    </script>
</body>
</html>
