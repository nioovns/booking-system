{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جزئیات سرویس | سامانه مدیریت خدمات</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    
    <style>
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 98;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        
        .menu-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: 70px;
            height: 100vh;
            background: rgba(8, 8, 12, 0.96);
            backdrop-filter: blur(16px);
            z-index: 99;
            border-left: 1px solid rgba(255, 255, 255, 0.06);
            transition: width 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: -8px 0 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        
        .sidebar.open {
            width: 240px;
        }
        
        .sidebar-header {
            padding: 24px 0 16px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: 20px;
        }
        
        .menu-toggle-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 10px 0;
            margin: 0 12px;
            color: rgba(255, 255, 255, 0.7);
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        
        .menu-toggle-item i {
            font-size: 22px;
            width: 28px;
            text-align: center;
        }
        
        .menu-toggle-item .menu-text {
            font-size: 13px;
            font-weight: 500;
            display: none;
            letter-spacing: 0.3px;
        }
        
        .sidebar.open .menu-toggle-item {
            justify-content: flex-start;
            padding: 10px 16px;
            margin: 0 12px;
        }
        
        .sidebar.open .menu-toggle-item .menu-text {
            display: inline;
        }
        
        .menu-toggle-item:hover {
            background: rgba(255, 255, 255, 0.08);
            color: white;
        }
        
        .sidebar-menu {
            list-style: none;
            padding: 0;
        }
        
        .sidebar-menu li {
            margin: 4px 0;
        }
        
        .sidebar-menu a {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 10px 0;
            margin: 0 12px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            border-radius: 40px;
            transition: all 0.25s ease;
            white-space: nowrap;
            font-size: 14px;
            font-weight: 450;
        }
        
        .sidebar-menu a i {
            font-size: 22px;
            width: 28px;
            text-align: center;
        }
        
        .sidebar-menu a .menu-text {
            display: none;
            font-size: 13px;
        }
        
        .sidebar.open .sidebar-menu a {
            justify-content: flex-start;
            padding: 10px 16px;
            margin: 0 12px;
        }
        
        .sidebar.open .sidebar-menu a .menu-text {
            display: inline;
        }
        
        .sidebar-menu a:hover {
            background: rgba(255, 255, 255, 0.06);
            color: white;
        }
        
        .sidebar-menu a.active {
            background: rgba(37, 99, 235, 0.15);
            color: white;
        }
        
        .sidebar-menu a.active i {
            background: #2563EB;
            color: white;
            border-radius: 50%;
            padding: 6px;
            width: 34px;
            margin-right: -3px;
        }
        
        .sidebar.open .sidebar-menu a.active i {
            margin-right: 0;
        }
        
        .main-content {
            margin-right: 70px;
            padding: 24px 32px;
            min-height: 100vh;
            transition: margin-right 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .page-title {
            color: white;
            font-size: 26px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .user-name {
            color: rgba(255, 255, 255, 0.85);
            font-weight: 500;
            font-size: 14px;
        }
        
        .btn-icon {
            background: rgba(255, 255, 255, 0.06);
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
            padding: 8px 12px;
            border-radius: 30px;
            transition: all 0.2s;
        }
        
        .btn-icon:hover {
            background: rgba(255, 255, 255, 0.12);
            color: white;
        }
        
        .service-detail-card {
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
        }
        
        .service-name {
            font-size: 24px;
            font-weight: 700;
            color: #1F2937;
            margin-bottom: 10px;
        }
        
        .service-provider {
            font-size: 14px;
            color: #6B7280;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .service-price {
            font-size: 28px;
            font-weight: 700;
            color: #2563EB;
            margin: 15px 0;
        }
        
        .service-description {
            color: #4B5563;
            line-height: 1.6;
            margin: 15px 0;
            padding: 15px 0;
            border-top: 1px solid #E5E7EB;
            border-bottom: 1px solid #E5E7EB;
        }
        
        .service-meta {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #6B7280;
            font-size: 14px;
        }
        
        .date-selector {
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
        }
        
        .date-selector h3 {
            font-size: 18px;
            font-weight: 600;
            color: #1F2937;
            margin-bottom: 15px;
            border-right: 3px solid #2563EB;
            padding-right: 12px;
        }
        
        .date-input {
            width: 100%;
            max-width: 250px;
            padding: 12px 16px;
            border: 1px solid #E5E7EB;
            border-radius: 14px;
            font-family: 'Vazirmatn';
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .time-slots {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 15px;
        }
        
        .time-slot {
            background: #F3F4F6;
            border: 1px solid #E5E7EB;
            border-radius: 30px;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .time-slot:hover {
            background: #E5E7EB;
        }
        
        .time-slot.selected {
            background: #2563EB;
            color: white;
            border-color: #2563EB;
        }
        
        .time-slot.booked {
            background: #FEE2E2;
            color: #DC2626;
            border-color: #FEE2E2;
            cursor: not-allowed;
            opacity: 0.6;
        }
        
        .no-slots {
            text-align: center;
            padding: 20px;
            color: #6B7280;
        }
        
        .btn-book {
            width: 100%;
            background: #2563EB;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Vazirmatn';
            transition: all 0.2s;
            margin-top: 20px;
        }
        
        .btn-book:hover {
            background: #1D4ED8;
            transform: translateY(-2px);
        }
        
        .btn-book:disabled {
            background: #9CA3AF;
            cursor: not-allowed;
        }
        
        @media (max-width: 800px) {
            .main-content {
                margin-right: 0;
                padding: 16px;
            }
            .sidebar {
                right: -70px;
            }
            .sidebar.open {
                right: 0;
            }
            .service-name {
                font-size: 20px;
            }
            .service-price {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <header class="glass-header">
        <div class="header-title">سامانه مدیریت خدمات</div>
    </header>
    
    <div class="menu-overlay" id="menuOverlay"></div>
    
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="menu-toggle-item" id="menuToggleBtn">
                <i class="fas fa-bars"></i>
                <span class="menu-text">منو</span>
            </div>
        </div>
        <ul class="sidebar-menu">
            <li><a href="/customer-services/"><i class="fas fa-search"></i><span class="menu-text"> جستجوی خدمات</span></a></li>
            <li><a href="/customer-bookings/"><i class="fas fa-calendar-check"></i><span class="menu-text"> رزروهای من</span></a></li>
            <li><a href="/customer-profile/"><i class="fas fa-user"></i><span class="menu-text"> پروفایل</span></a></li>
        </ul>
    </div>
    
    <div class="main-content">
        <div class="dashboard-header">
            <h1 class="page-title">جزئیات سرویس</h1>
            <div class="user-info">
                <span class="user-name" id="username">مشتری</span>
                <button class="btn-icon" id="logoutBtn" title="خروج"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
        
        <div class="service-detail-card" id="serviceDetail">
            <div style="text-align: center; padding: 40px;">در حال بارگذاری...</div>
        </div>
        
        <div class="date-selector" id="bookingSection" style="display: none;">
            <h3>انتخاب زمان رزرو</h3>
            <input type="date" id="bookingDate" class="date-input">
            <div id="timeSlotsContainer">
                <div class="time-slots" id="timeSlots"></div>
            </div>
            <button id="bookNowBtn" class="btn-book">ثبت رزرو</button>
        </div>
    </div>
    
    <script src="{% static 'js/api.js' %}"></script>
    <script>
        const sidebar = document.getElementById('sidebar');
        const menuOverlay = document.getElementById('menuOverlay');
        const menuToggleBtn = document.getElementById('menuToggleBtn');
        
        function toggleMenu() {
            if (sidebar.classList.contains('open')) {
                sidebar.classList.remove('open');
                menuOverlay.classList.remove('active');
                document.body.style.overflow = '';
            } else {
                sidebar.classList.add('open');
                menuOverlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            }
        }
        
        if (menuToggleBtn) menuToggleBtn.addEventListener('click', toggleMenu);
        if (menuOverlay) menuOverlay.addEventListener('click', toggleMenu);
        
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', () => {
                AuthAPI.logout();
            });
        }
        
        const usernameSpan = document.getElementById('username');
        if (usernameSpan) {
            usernameSpan.innerText = localStorage.getItem('username') || 'مشتری';
        }
        
        const urlParams = new URLSearchParams(window.location.search);
        const serviceId = urlParams.get('id');
        
        let currentService = null;
        let currentSlots = [];
        let selectedSlotId = null;
        
        async function loadServiceDetail() {
            if (!serviceId) {
                showError('شناسه سرویس یافت نشد');
                return;
            }
            
            try {
                const searchResults = await CustomerAPI.searchServices({});
                currentService = searchResults.find(s => s.id == serviceId);
                
                if (currentService) {
                    document.getElementById('serviceDetail').innerHTML = `
                        <div class="service-name">${currentService.name}</div>
                        <div class="service-provider"><i class="fas fa-store"></i> ${currentService.provider}</div>
                        <div class="service-price">${currentService.price.toLocaleString()} تومان</div>
                        <div class="service-description">
                            ${currentService.description || 'توضیحاتی برای این سرویس ثبت نشده است.'}
                        </div>
                        <div class="service-meta">
                            <div class="meta-item"><i class="fas fa-tag"></i> دسته‌بندی: ${currentService.category || 'عمومی'}</div>
                        </div>
                    `;
                    document.getElementById('bookingSection').style.display = 'block';
                    
                    const tomorrow = new Date();
                    tomorrow.setDate(tomorrow.getDate() + 1);
                    document.getElementById('bookingDate').value = tomorrow.toISOString().split('T')[0];
                    
                    loadTimeSlots();
                } else {
                    document.getElementById('serviceDetail').innerHTML = '<div style="text-align: center; padding: 40px;">سرویس مورد نظر یافت نشد</div>';
                }
            } catch(err) {
                showError('خطا در بارگذاری اطلاعات سرویس');
                console.error(err);
            }
        }
        
        async function loadTimeSlots() {
            const date = document.getElementById('bookingDate').value;
            if (!date) return;
            
            try {
                const slots = await CustomerAPI.getServiceTimeSlots(serviceId, date);
                currentSlots = slots;
                const availableSlots = slots.filter(slot => slot.available);
                
                if (availableSlots.length > 0) {
                    document.getElementById('timeSlots').innerHTML = availableSlots.map(slot => `
                        <div class="time-slot" data-id="${slot.id}" onclick="selectSlot(${slot.id})">
                            ${slot.time}
                        </div>
                    `).join('');
                    selectedSlotId = null;
                } else {
                    document.getElementById('timeSlots').innerHTML = '<div class="no-slots">هیچ ساعتی برای این تاریخ موجود نیست</div>';
                }
            } catch(err) {
                showError('خطا در بارگذاری ساعات');
                console.error(err);
            }
        }
        
        window.selectSlot = (slotId) => {
            document.querySelectorAll('.time-slot').forEach(el => {
                el.classList.remove('selected');
            });
            const selectedEl = document.querySelector(`.time-slot[data-id="${slotId}"]`);
            if (selectedEl) {
                selectedEl.classList.add('selected');
                selectedSlotId = slotId;
            }
        };
        
        document.getElementById('bookNowBtn').addEventListener('click', async () => {
            if (!selectedSlotId) {
                showError('لطفاً یک ساعت را انتخاب کنید');
                return;
            }
            
            const selectedSlot = currentSlots.find(s => s.id == selectedSlotId);
            if (!selectedSlot || !selectedSlot.available) {
                showError('این ساعت قابل رزرو نیست');
                return;
            }
            
            const date = document.getElementById('bookingDate').value;
            const price = currentService.price;
            
            window.location.href = `customer-booking.html?serviceId=${serviceId}&slotId=${selectedSlotId}&date=${date}&time=${selectedSlot.time}&price=${price}`;
        });
        
        document.getElementById('bookingDate').addEventListener('change', () => {
            loadTimeSlots();
        });
        
        loadServiceDetail();
    </script>
</body>
</html>
