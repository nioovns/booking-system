{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدیریت زمان‌بندی | سامانه مدیریت خدمات</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    
    <style>
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 98;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        
        .menu-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: 70px;
            height: 100vh;
            background: rgba(8, 8, 12, 0.96);
            backdrop-filter: blur(16px);
            z-index: 99;
            border-left: 1px solid rgba(255, 255, 255, 0.06);
            transition: width 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: -8px 0 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        
        .sidebar.open {
            width: 240px;
        }
        
        .sidebar-header {
            padding: 24px 0 16px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: 20px;
        }
        
        .menu-toggle-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 10px 0;
            margin: 0 12px;
            color: rgba(255, 255, 255, 0.7);
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        
        .menu-toggle-item i {
            font-size: 22px;
            width: 28px;
            text-align: center;
        }
        
        .menu-toggle-item .menu-text {
            font-size: 13px;
            font-weight: 500;
            display: none;
            letter-spacing: 0.3px;
        }
        
        .sidebar.open .menu-toggle-item {
            justify-content: flex-start;
            padding: 10px 16px;
            margin: 0 12px;
        }
        
        .sidebar.open .menu-toggle-item .menu-text {
            display: inline;
        }
        
        .menu-toggle-item:hover {
            background: rgba(255, 255, 255, 0.08);
            color: white;
        }
        
        .sidebar-menu {
            list-style: none;
            padding: 0;
        }
        
        .sidebar-menu li {
            margin: 4px 0;
        }
        
        .sidebar-menu a {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 10px 0;
            margin: 0 12px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            border-radius: 40px;
            transition: all 0.25s ease;
            white-space: nowrap;
            font-size: 14px;
            font-weight: 450;
        }
        
        .sidebar-menu a i {
            font-size: 22px;
            width: 28px;
            text-align: center;
        }
        
        .sidebar-menu a .menu-text {
            display: none;
            font-size: 13px;
        }
        
        .sidebar.open .sidebar-menu a {
            justify-content: flex-start;
            padding: 10px 16px;
            margin: 0 12px;
        }
        
        .sidebar.open .sidebar-menu a .menu-text {
            display: inline;
        }
        
        .sidebar-menu a:hover {
            background: rgba(255, 255, 255, 0.06);
            color: white;
        }
        
        .sidebar-menu a.active {
            background: rgba(37, 99, 235, 0.15);
            color: white;
        }
        
        .sidebar-menu a.active i {
            background: #2563EB;
            color: white;
            border-radius: 50%;
            padding: 6px;
            width: 34px;
            margin-right: -3px;
        }
        
        .sidebar.open .sidebar-menu a.active i {
            margin-right: 0;
        }
        
        .main-content {
            margin-right: 70px;
            padding: 24px 32px;
            min-height: 100vh;
            transition: margin-right 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .page-title {
            color: white;
            font-size: 26px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .user-name {
            color: rgba(255, 255, 255, 0.85);
            font-weight: 500;
            font-size: 14px;
        }
        
        .btn-icon {
            background: rgba(255, 255, 255, 0.06);
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
            padding: 8px 12px;
            border-radius: 30px;
            transition: all 0.2s;
        }
        
        .btn-icon:hover {
            background: rgba(255, 255, 255, 0.12);
            color: white;
        }
        
        .service-selector {
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
        }
        
        .service-selector label {
            display: block;
            margin-bottom: 10px;
            color: #374151;
            font-weight: 600;
            font-size: 14px;
        }
        
        .service-selector select {
            width: 100%;
            max-width: 300px;
            padding: 12px 16px;
            border: 1px solid #E5E7EB;
            border-radius: 14px;
            font-family: 'Vazirmatn';
            font-size: 14px;
            background: white;
            cursor: pointer;
        }
        
        .timeslots-container {
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 20px;
        }
        
        .timeslots-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .timeslots-header h2 {
            color: #1F2937;
            font-size: 18px;
            font-weight: 600;
            margin: 0;
        }
        
        .btn-add {
            background: #2563EB;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'Vazirmatn';
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-add:hover {
            background: #1D4ED8;
            transform: translateY(-1px);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 14px 12px;
            text-align: right;
            border-bottom: 1px solid #E5E7EB;
        }
        
        th {
            background: #F9FAFB;
            font-weight: 600;
            color: #374151;
            font-size: 14px;
        }
        
        td {
            color: #4B5563;
            font-size: 14px;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-available {
            background: #D1FAE5;
            color: #059669;
        }
        
        .status-booked {
            background: #FEE2E2;
            color: #DC2626;
        }
        
        .action-buttons {
            display: flex;
            gap: 8px;
        }
        
        .btn-delete {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            padding: 5px 8px;
            border-radius: 8px;
            transition: all 0.2s;
            color: #EF4444;
        }
        
        .btn-delete:hover {
            background: #FEE2E2;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 28px;
            width: 90%;
            max-width: 420px;
            max-height: none;
            overflow-y: visible;
            position: relative;
        }
        
        .modal-close {
            position: absolute;
            top: 15px;
            left: 20px;
            background: none;
            border: none;
            font-size: 24px;
            color: #9CA3AF;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-close:hover {
            background: #F3F4F6;
            color: #4B5563;
        }
        
        .modal-content h3 {
            margin-bottom: 20px;
            color: #1F2937;
            font-size: 20px;
            padding-left: 40px;
        }
        
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #E5E7EB;
            border-radius: 12px;
            font-family: 'Vazirmatn';
            font-size: 14px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        
        @media (max-width: 800px) {
            .main-content {
                margin-right: 0;
                padding: 16px;
            }
            .sidebar {
                right: -70px;
            }
            .sidebar.open {
                right: 0;
            }
            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }
            th, td {
                padding: 10px 8px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <header class="glass-header">
        <div class="header-title">پنل ارائه‌دهنده خدمات</div>
    </header>
    
    <div class="menu-overlay" id="menuOverlay"></div>
    
    <!-- منوی Provider - بدون داشبورد و نظرات -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="menu-toggle-item" id="menuToggleBtn">
                <i class="fas fa-bars"></i>
                <span class="menu-text">منو</span>
            </div>
        </div>
        <ul class="sidebar-menu">
            <li><a href="/provider-dashboard/"><i class="fas fa-chart-line"></i><span class="menu-text"> داشبورد</span></a></li>
            <li><a href="/provider-services/"><i class="fas fa-concierge-bell"></i><span class="menu-text"> سرویس‌ها</span></a></li>
            <li><a href="/provider-timeslots/" class="active"><i class="fas fa-clock"></i><span class="menu-text"> زمان‌بندی</span></a></li>
            <li><a href="/provider-bookings/"><i class="fas fa-calendar-check"></i><span class="menu-text"> رزروها</span></a></li>
            <li><a href="/provider-profile/"><i class="fas fa-user"></i><span class="menu-text"> پروفایل</span></a></li>
        </ul>
    </div>
    
    <div class="main-content">
        <div class="dashboard-header">
            <h1 class="page-title">مدیریت زمان‌بندی</h1>
            <div class="user-info">
                <span class="user-name" id="username">ارائه‌دهنده</span>
                <button class="btn-icon" id="profileBtn" title="پروفایل"><i class="fas fa-user-circle"></i></button>
                <button class="btn-icon" id="logoutBtn" title="خروج"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
        
        <div class="service-selector">
            <label>انتخاب سرویس</label>
            <select id="serviceSelect">
                <option value="">-- انتخاب کنید --</option>
            </select>
        </div>
        
        <div class="timeslots-container">
            <div class="timeslots-header">
                <h2><i class="fas fa-clock"></i> زمان‌بندی سرویس</h2>
                <button class="btn-add" id="addSlotBtn">
                    <i class="fas fa-plus"></i> افزودن زمان جدید
                </button>
            </div>
            <div style="overflow-x: auto;">
                <table id="slotsTable">
                    <thead>
                        <tr><th>ساعت</th><th>وضعیت</th><th>عملیات</th></tr>
                    </thead>
                    <tbody id="slotsTableBody">
                        <tr><td colspan="3" style="text-align: center;">لطفاً یک سرویس انتخاب کنید</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <!-- مودال افزودن زمان -->
    <div id="slotModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeSlotModal()">×</button>
            <h3>افزودن زمان جدید</h3>
            <div class="form-row">
                <input type="time" id="slotTime" placeholder="ساعت">
                <select id="slotStatus">
                    <option value="available">آزاد</option>
                    <option value="booked">رزرو شده</option>
                </select>
            </div>
            <div class="modal-buttons">
                <button id="saveSlotBtn" class="btn-primary" style="flex:1;">ذخیره</button>
                <button id="closeModalBtn" class="btn-secondary" style="flex:1;">انصراف</button>
            </div>
        </div>
    </div>
    
    <script src="{% static 'js/api.js' %}"></script>
    <script>
        const sidebar = document.getElementById('sidebar');
        const menuOverlay = document.getElementById('menuOverlay');
        const menuToggleBtn = document.getElementById('menuToggleBtn');
        
        function toggleMenu() {
            if (sidebar.classList.contains('open')) {
                sidebar.classList.remove('open');
                menuOverlay.classList.remove('active');
                document.body.style.overflow = '';
            } else {
                sidebar.classList.add('open');
                menuOverlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            }
        }
        
        if (menuToggleBtn) menuToggleBtn.addEventListener('click', toggleMenu);
        if (menuOverlay) menuOverlay.addEventListener('click', toggleMenu);
        
        const profileBtn = document.getElementById('profileBtn');
        if (profileBtn) {
            profileBtn.addEventListener('click', () => {
                window.location.href = 'provider-profile.html';
            });
        }
        
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', () => {
                AuthAPI.logout();
            });
        }
        
        const usernameSpan = document.getElementById('username');
        if (usernameSpan) {
            usernameSpan.innerText = localStorage.getItem('username') || 'ارائه‌دهنده';
        }
        
        let servicesList = [];
        let currentServiceId = null;
        
        window.closeSlotModal = () => {
            document.getElementById('slotModal').classList.remove('active');
        };
        
        async function loadServices() {
            try {
                servicesList = await ProviderAPI.getMyServices();
                const select = document.getElementById('serviceSelect');
                select.innerHTML = '<option value="">-- انتخاب کنید --</option>';
                
                servicesList.forEach(service => {
                    select.innerHTML += `<option value="${service.id}">${service.name}</option>`;
                });
            } catch(err) {
                showError('خطا در بارگذاری سرویس‌ها');
            }
        }
        
        async function loadTimeSlots(serviceId) {
            if (!serviceId) {
                document.getElementById('slotsTableBody').innerHTML = '<tr><td colspan="3" style="text-align: center;">لطفاً یک سرویس انتخاب کنید</td></tr>';
                return;
            }
            
            try {
                const slots = await ProviderAPI.getTimeSlots(serviceId);
                if (slots && slots.length > 0) {
                    document.getElementById('slotsTableBody').innerHTML = slots.map(slot => `
                        <tr>
                            <td>${slot.time}</td>
                            <td><span class="status-badge ${slot.available ? 'status-available' : 'status-booked'}">${slot.available ? 'آزاد' : 'رزرو شده'}</span></td>
                            <td class="action-buttons">
                                <button class="btn-delete" onclick="deleteSlot(${slot.id})" title="حذف"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    `).join('');
                } else {
                    document.getElementById('slotsTableBody').innerHTML = '<tr><td colspan="3" style="text-align: center;">هیچ زمانی تعریف نشده است</td></tr>';
                }
            } catch(err) {
                showError('خطا در بارگذاری زمان‌بندی');
            }
        }
        
        document.getElementById('serviceSelect').addEventListener('change', (e) => {
            currentServiceId = parseInt(e.target.value);
            if (currentServiceId) {
                loadTimeSlots(currentServiceId);
            } else {
                document.getElementById('slotsTableBody').innerHTML = '<tr><td colspan="3" style="text-align: center;">لطفاً یک سرویس انتخاب کنید</td></tr>';
            }
        });
        
        document.getElementById('addSlotBtn').addEventListener('click', () => {
            if (!currentServiceId) {
                showError('لطفاً ابتدا یک سرویس انتخاب کنید');
                return;
            }
            document.getElementById('slotTime').value = '';
            document.getElementById('slotStatus').value = 'available';
            document.getElementById('slotModal').classList.add('active');
        });
        
        document.getElementById('closeModalBtn').addEventListener('click', () => {
            document.getElementById('slotModal').classList.remove('active');
        });
        
        document.getElementById('saveSlotBtn').addEventListener('click', async () => {
            const time = document.getElementById('slotTime').value;
            const available = document.getElementById('slotStatus').value === 'available';
            
            if (!time) {
                showError('لطفاً ساعت را وارد کنید');
                return;
            }
            
            try {
                await ProviderAPI.addTimeSlot(currentServiceId, { time, available });
                showSuccess('زمان با موفقیت اضافه شد');
                document.getElementById('slotModal').classList.remove('active');
                loadTimeSlots(currentServiceId);
            } catch(err) {
                showError(err.message);
            }
        });
        
        window.deleteSlot = async (slotId) => {
            if (confirm('آیا از حذف این زمان اطمینان دارید؟')) {
                try {
                    await ProviderAPI.deleteTimeSlot(slotId);
                    showSuccess('زمان با موفقیت حذف شد');
                    loadTimeSlots(currentServiceId);
                } catch(err) {
                    showError(err.message);
                }
            }
        };
        
        loadServices();
    </script>
</body>
</html>
