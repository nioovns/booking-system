{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پروفایل من | سامانه مدیریت خدمات</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    
    <style>
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 98;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        
        .menu-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: 70px;
            height: 100vh;
            background: rgba(8, 8, 12, 0.96);
            backdrop-filter: blur(16px);
            z-index: 99;
            border-left: 1px solid rgba(255, 255, 255, 0.06);
            transition: width 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: -8px 0 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        
        .sidebar.open {
            width: 240px;
        }
        
        .sidebar-header {
            padding: 24px 0 16px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: 20px;
        }
        
        .menu-toggle-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 10px 0;
            margin: 0 12px;
            color: rgba(255, 255, 255, 0.7);
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        
        .menu-toggle-item i {
            font-size: 22px;
            width: 28px;
            text-align: center;
        }
        
        .menu-toggle-item .menu-text {
            font-size: 13px;
            font-weight: 500;
            display: none;
            letter-spacing: 0.3px;
        }
        
        .sidebar.open .menu-toggle-item {
            justify-content: flex-start;
            padding: 10px 16px;
            margin: 0 12px;
        }
        
        .sidebar.open .menu-toggle-item .menu-text {
            display: inline;
        }
        
        .menu-toggle-item:hover {
            background: rgba(255, 255, 255, 0.08);
            color: white;
        }
        
        .sidebar-menu {
            list-style: none;
            padding: 0;
        }
        
        .sidebar-menu li {
            margin: 4px 0;
        }
        
        .sidebar-menu a {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 10px 0;
            margin: 0 12px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            border-radius: 40px;
            transition: all 0.25s ease;
            white-space: nowrap;
            font-size: 14px;
            font-weight: 450;
        }
        
        .sidebar-menu a i {
            font-size: 22px;
            width: 28px;
            text-align: center;
        }
        
        .sidebar-menu a .menu-text {
            display: none;
            font-size: 13px;
        }
        
        .sidebar.open .sidebar-menu a {
            justify-content: flex-start;
            padding: 10px 16px;
            margin: 0 12px;
        }
        
        .sidebar.open .sidebar-menu a .menu-text {
            display: inline;
        }
        
        .sidebar-menu a:hover {
            background: rgba(255, 255, 255, 0.06);
            color: white;
        }
        
        .sidebar-menu a.active {
            background: rgba(37, 99, 235, 0.15);
            color: white;
        }
        
        .sidebar-menu a.active i {
            background: #2563EB;
            color: white;
            border-radius: 50%;
            padding: 6px;
            width: 34px;
            margin-right: -3px;
        }
        
        .sidebar.open .sidebar-menu a.active i {
            margin-right: 0;
        }
        
        .main-content {
            margin-right: 70px;
            padding: 24px 32px;
            min-height: 100vh;
            transition: margin-right 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .page-title {
            color: white;
            font-size: 26px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .user-name {
            color: rgba(255, 255, 255, 0.85);
            font-weight: 500;
            font-size: 14px;
        }
        
        .btn-icon {
            background: rgba(255, 255, 255, 0.06);
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
            padding: 8px 12px;
            border-radius: 30px;
            transition: all 0.2s;
        }
        
        .btn-icon:hover {
            background: rgba(255, 255, 255, 0.12);
            color: white;
        }
        
        .profile-container {
            width: 100%;
            max-width: 900px;
            margin: 30px auto 80px;
            padding: 0 30px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .full-width {
            grid-column: span 2;
        }

        .avatar-section {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .avatar-preview {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #60A5FA;
        }

        .avatar-placeholder {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1E3A8A, #2563EB);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #60A5FA;
        }

        .avatar-placeholder i {
            font-size: 45px;
            color: white;
        }

        .btn-upload {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'Vazirmatn';
            transition: all 0.2s;
        }

        .btn-upload:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .file-input {
            display: none;
        }

        .role-display {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .role-display i {
            color: #60A5FA;
            font-size: 18px;
        }

        .divider {
            margin: 40px 0 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.15);
        }

        .divider-title {
            font-size: 20px;
            font-weight: 600;
            color: white;
            margin-bottom: 25px;
        }

        .fab-container {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 1000;
        }

        @media (max-width: 700px) {
            .form-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .full-width {
                grid-column: span 1;
            }
            .profile-container {
                padding: 0 20px;
                margin: 20px auto;
            }
            .avatar-section {
                justify-content: center;
                text-align: center;
            }
            .fab-container {
                bottom: 20px;
                left: 20px;
            }
            .main-content {
                margin-right: 0;
                padding: 16px;
            }
            .sidebar {
                right: -70px;
            }
            .sidebar.open {
                right: 0;
            }
        }
    </style>
</head>
<body>
    <header class="glass-header">
        <div class="header-title">سامانه مدیریت خدمات</div>
    </header>
    
    <div class="menu-overlay" id="menuOverlay"></div>
    
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="menu-toggle-item" id="menuToggleBtn">
                <i class="fas fa-bars"></i>
                <span class="menu-text">منو</span>
            </div>
        </div>
        <ul class="sidebar-menu">
            <li><a href="/customer-services/"><i class="fas fa-search"></i><span class="menu-text"> جستجوی خدمات</span></a></li>
            <li><a href="/customer-bookings/"><i class="fas fa-calendar-check"></i><span class="menu-text"> رزروهای من</span></a></li>
            <li><a href="/customer-profile/" class="active"><i class="fas fa-user"></i><span class="menu-text"> پروفایل</span></a></li>
        </ul>
    </div>
    
    <div class="main-content">
        <div class="dashboard-header">
            <h1 class="page-title">پروفایل من</h1>
            <div class="user-info">
                <span class="user-name" id="username">مشتری</span>
                <button class="btn-icon" id="logoutBtn" title="خروج"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
        
        <div class="profile-container">
            <div class="avatar-section full-width">
                <div id="avatarPreview">
                    <div class="avatar-placeholder">
                        <i class="fas fa-user"></i>
                    </div>
                </div>
                <div>
                    <button type="button" class="btn-upload" id="uploadAvatarBtn">
                        <i class="fas fa-camera"></i> انتخاب تصویر جدید
                    </button>
                    <input type="file" id="avatarInput" class="file-input" accept="image/*">
                    <p style="color: rgba(255,255,255,0.5); font-size: 12px; margin-top: 8px;">فرمت‌های مجاز: JPG, PNG</p>
                </div>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label">نام</label>
                    <input type="text" id="firstName" class="form-input" placeholder="نام خود را وارد کنید">
                </div>
                <div class="form-group">
                    <label class="form-label">نام خانوادگی</label>
                    <input type="text" id="lastName" class="form-input" placeholder="نام خانوادگی">
                </div>
                <div class="form-group">
                    <label class="form-label">شماره تماس</label>
                    <input type="tel" id="phone" class="form-input" placeholder="0912xxx">
                </div>
                <div class="form-group">
                    <label class="form-label">ایمیل</label>
                    <input type="email" id="email" class="form-input" placeholder="example@domain.com">
                </div>
                
                <div class="form-group full-width">
                    <label class="form-label">نقش کاربری</label>
                    <div class="role-display">
                        <i class="fas fa-shield-alt"></i>
                        <span id="roleText">مشتری</span>
                    </div>
                </div>
            </div>

            <div class="divider"></div>
            <div class="divider-title">تغییر رمز عبور</div>
            
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label">رمز فعلی</label>
                    <input type="password" id="oldPassword" class="form-input" placeholder="رمز فعلی خود را وارد کنید">
                </div>
                <div class="form-group">
                    <label class="form-label">رمز جدید</label>
                    <input type="password" id="newPassword" class="form-input" placeholder="حداقل ۶ کاراکتر">
                </div>
                <div class="form-group full-width">
                    <label class="form-label">تکرار رمز جدید</label>
                    <input type="password" id="confirmPassword" class="form-input" placeholder="تکرار رمز جدید">
                </div>
            </div>
        </div>
    </div>
    
    <div class="fab-container">
        <button id="saveProfileBtn" class="btn-primary">
            <i class="fas fa-save"></i>
            ذخیره تغییرات
        </button>
    </div>
    
    <script src="{% static 'js/api.js' %}"></script>
    <script>
        const sidebar = document.getElementById('sidebar');
        const menuOverlay = document.getElementById('menuOverlay');
        const menuToggleBtn = document.getElementById('menuToggleBtn');
        
        function toggleMenu() {
            if (sidebar.classList.contains('open')) {
                sidebar.classList.remove('open');
                menuOverlay.classList.remove('active');
                document.body.style.overflow = '';
            } else {
                sidebar.classList.add('open');
                menuOverlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            }
        }
        
        if (menuToggleBtn) menuToggleBtn.addEventListener('click', toggleMenu);
        if (menuOverlay) menuOverlay.addEventListener('click', toggleMenu);
        
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', () => {
                AuthAPI.logout();
            });
        }
        
        const usernameSpan = document.getElementById('username');
        if (usernameSpan) {
            usernameSpan.innerText = localStorage.getItem('username') || 'مشتری';
        }
        
        const roleMap = {
            'admin': 'مدیر سیستم',
            'provider': 'ارائه‌دهنده خدمت',
            'customer': 'مشتری'
        };

        async function loadProfile() {
            try {
                const profile = await AuthAPI.getProfile();
                document.getElementById('firstName').value = profile.firstName || '';
                document.getElementById('lastName').value = profile.lastName || '';
                document.getElementById('phone').value = profile.phone || '';
                document.getElementById('email').value = profile.email || '';
                
                const userRole = localStorage.getItem('userRole') || profile.role || 'customer';
                document.getElementById('roleText').innerText = roleMap[userRole] || 'مشتری';
                
                if (profile.avatar) {
                    document.getElementById('avatarPreview').innerHTML = `<img src="${profile.avatar}" class="avatar-preview" alt="آواتار">`;
                }
            } catch(err) {
                console.error(err);
                const userRole = localStorage.getItem('userRole') || 'customer';
                document.getElementById('roleText').innerText = roleMap[userRole] || 'مشتری';
            }
        }

        const avatarInput = document.getElementById('avatarInput');
        const uploadBtn = document.getElementById('uploadAvatarBtn');
        let selectedAvatarFile = null;

        uploadBtn.addEventListener('click', () => avatarInput.click());
        avatarInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                selectedAvatarFile = file;
                const reader = new FileReader();
                reader.onload = (event) => {
                    document.getElementById('avatarPreview').innerHTML = `<img src="${event.target.result}" class="avatar-preview" alt="آواتار">`;
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('saveProfileBtn').addEventListener('click', async () => {
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const email = document.getElementById('email').value.trim();
            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            try {
                const formData = new FormData();
                formData.append('firstName', firstName);
                formData.append('lastName', lastName);
                formData.append('phone', phone);
                formData.append('email', email);
                if (selectedAvatarFile) {
                    formData.append('avatar', selectedAvatarFile);
                }
                
                await AuthAPI.updateProfile(formData);
                
                if (oldPassword && newPassword) {
                    if (newPassword !== confirmPassword) {
                        showError('رمز جدید و تکرار آن مطابقت ندارند');
                        return;
                    }
                    if (newPassword.length < 6) {
                        showError('رمز عبور جدید باید حداقل ۶ کاراکتر باشد');
                        return;
                    }
                    await AuthAPI.changePassword(oldPassword, newPassword, confirmPassword);
                    document.getElementById('oldPassword').value = '';
                    document.getElementById('newPassword').value = '';
                    document.getElementById('confirmPassword').value = '';
                }
                
                showSuccess('اطلاعات با موفقیت ذخیره شد');
                setTimeout(() => location.reload(), 1500);
            } catch(err) {
                showError(err.message);
            }
        });

        loadProfile();
    </script>
</body>
</html>
