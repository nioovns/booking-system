{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جزئیات سرویس | سامانه مدیریت خدمات</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    
    <style>
        /* ===== استایل‌ها (همان قبلی) ===== */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 98;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .menu-overlay.active { opacity: 1; visibility: visible; }
        
        .sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: 70px;
            height: 100vh;
            background: rgba(8, 8, 12, 0.96);
            backdrop-filter: blur(16px);
            z-index: 99;
            border-left: 1px solid rgba(255, 255, 255, 0.06);
            transition: width 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: -8px 0 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        .sidebar.open { width: 240px; }
        
        .sidebar-header {
            padding: 24px 0 16px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: 20px;
        }
        
        .menu-toggle-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 10px 0;
            margin: 0 12px;
            color: rgba(255, 255, 255, 0.7);
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .menu-toggle-item i { font-size: 22px; width: 28px; text-align: center; }
        .menu-toggle-item .menu-text { font-size: 13px; font-weight: 500; display: none; letter-spacing: 0.3px; }
        .sidebar.open .menu-toggle-item { justify-content: flex-start; padding: 10px 16px; margin: 0 12px; }
        .sidebar.open .menu-toggle-item .menu-text { display: inline; }
        .menu-toggle-item:hover { background: rgba(255, 255, 255, 0.08); color: white; }
        
        .sidebar-menu { list-style: none; padding: 0; }
        .sidebar-menu li { margin: 4px 0; }
        .sidebar-menu a {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 10px 0;
            margin: 0 12px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            border-radius: 40px;
            transition: all 0.25s ease;
            white-space: nowrap;
            font-size: 14px;
            font-weight: 450;
        }
        .sidebar-menu a i { font-size: 22px; width: 28px; text-align: center; }
        .sidebar-menu a .menu-text { display: none; font-size: 13px; }
        .sidebar.open .sidebar-menu a { justify-content: flex-start; padding: 10px 16px; margin: 0 12px; }
        .sidebar.open .sidebar-menu a .menu-text { display: inline; }
        .sidebar-menu a:hover { background: rgba(255, 255, 255, 0.06); color: white; }
        .sidebar-menu a.active { background: rgba(37, 99, 235, 0.15); color: white; }
        .sidebar-menu a.active i { background: #2563EB; color: white; border-radius: 50%; padding: 6px; width: 34px; margin-right: -3px; }
        .sidebar.open .sidebar-menu a.active i { margin-right: 0; }
        
        .main-content {
            margin-right: 70px;
            padding: 24px 32px;
            min-height: 100vh;
            transition: margin-right 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        .page-title { color: white; font-size: 26px; font-weight: 600; letter-spacing: -0.3px; }
        
        .user-info { display: flex; align-items: center; gap: 16px; }
        .user-name { color: rgba(255, 255, 255, 0.85); font-weight: 500; font-size: 14px; }
        
        .btn-icon {
            background: rgba(255, 255, 255, 0.06);
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
            padding: 8px 12px;
            border-radius: 30px;
            transition: all 0.2s;
        }
        .btn-icon:hover { background: rgba(255, 255, 255, 0.12); color: white; }
        
        .service-detail-card {
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
        }
        
        .service-name {
            font-size: 24px;
            font-weight: 700;
            color: #1F2937;
            margin-bottom: 10px;
        }
        
        .service-provider {
            font-size: 14px;
            color: #6B7280;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .service-price {
            font-size: 28px;
            font-weight: 700;
            color: #2563EB;
            margin: 15px 0;
        }
        
        .service-description {
            color: #4B5563;
            line-height: 1.6;
            margin: 15px 0;
            padding: 15px 0;
            border-top: 1px solid #E5E7EB;
            border-bottom: 1px solid #E5E7EB;
        }
        
        .service-meta {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #6B7280;
            font-size: 14px;
        }
        
        .date-selector {
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
        }
        
        .date-selector h3 {
            font-size: 18px;
            font-weight: 600;
            color: #1F2937;
            margin-bottom: 15px;
            border-right: 3px solid #2563EB;
            padding-right: 12px;
        }
        
        .date-input {
            width: 100%;
            max-width: 250px;
            padding: 12px 16px;
            border: 1px solid #E5E7EB;
            border-radius: 14px;
            font-family: 'Vazirmatn';
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .time-slots {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 15px;
        }
        
        .time-slot {
            background: #F3F4F6;
            border: 1px solid #E5E7EB;
            border-radius: 30px;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .time-slot:hover {
            background: #E5E7EB;
        }
        
        .time-slot.selected {
            background: #2563EB;
            color: white;
            border-color: #2563EB;
        }
        
        .time-slot.booked {
            background: #FEE2E2;
            color: #DC2626;
            border-color: #FEE2E2;
            cursor: not-allowed;
            opacity: 0.6;
        }
        
        .no-slots {
            text-align: center;
            padding: 20px;
            color: #6B7280;
        }
        
        .btn-book {
            width: 100%;
            background: #2563EB;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Vazirmatn';
            transition: all 0.2s;
            margin-top: 20px;
        }
        
        .btn-book:hover {
            background: #1D4ED8;
            transform: translateY(-2px);
        }
        
        .btn-book:disabled {
            background: #9CA3AF;
            cursor: not-allowed;
        }
        
        @media (max-width: 800px) {
            .main-content {
                margin-right: 0;
                padding: 16px;
            }
            .sidebar {
                right: -70px;
            }
            .sidebar.open {
                right: 0;
            }
            .service-name {
                font-size: 20px;
            }
            .service-price {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <header class="glass-header">
        <div class="header-title">سامانه مدیریت خدمات</div>
    </header>
    
    <div class="menu-overlay" id="menuOverlay"></div>
    
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="menu-toggle-item" id="menuToggleBtn">
                <i class="fas fa-bars"></i>
                <span class="menu-text">منو</span>
            </div>
        </div>
        <ul class="sidebar-menu">
            <li><a href="/customer-services/"><i class="fas fa-search"></i><span class="menu-text"> جستجوی خدمات</span></a></li>
            <li><a href="/customer-bookings/"><i class="fas fa-calendar-check"></i><span class="menu-text"> رزروهای من</span></a></li>
            <li><a href="/customer-profile/"><i class="fas fa-user"></i><span class="menu-text"> پروفایل</span></a></li>
        </ul>
    </div>
    
    <div class="main-content">
        <div class="dashboard-header">
            <h1 class="page-title">جزئیات سرویس</h1>
            <div class="user-info">
                <span class="user-name" id="username">مشتری</span>
                <button class="btn-icon" id="logoutBtn" title="خروج"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
        
        <div class="service-detail-card" id="serviceDetail">
            <div style="text-align: center; padding: 40px;">در حال بارگذاری...</div>
        </div>
        
        <div class="date-selector" id="bookingSection" style="display: none;">
            <h3>انتخاب زمان رزرو</h3>
            <input type="date" id="bookingDate" class="date-input">
            <div id="timeSlotsContainer">
                <div class="time-slots" id="timeSlots"></div>
            </div>
            <button id="bookNowBtn" class="btn-book">ثبت رزرو</button>
        </div>
    </div>
    
    <script src="{% static 'js/api.js' %}"></script>
    <script>
        // ============================================================
        // ================== تبدیل تاریخ به فارسی ===================
        // ============================================================
        function toPersianDate(dateString) {
            if (!dateString) return 'نامشخص';
            
            const date = new Date(dateString);
            if (isNaN(date.getTime())) return 'نامشخص';
            
            return date.toLocaleDateString('fa-IR', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit'
            });
        }
        
        function toPersianTime(dateString) {
            if (!dateString) return 'نامشخص';
            
            const date = new Date(dateString);
            if (isNaN(date.getTime())) return 'نامشخص';
            
            return date.toLocaleTimeString('fa-IR', {
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        
        // ============================================================
        // ================== متغیرها =================================
        // ============================================================
        const sidebar = document.getElementById('sidebar');
        const menuOverlay = document.getElementById('menuOverlay');
        const menuToggleBtn = document.getElementById('menuToggleBtn');
        
        const urlParams = new URLSearchParams(window.location.search);
        const serviceId = urlParams.get('id');
        
        let currentService = null;
        let selectedSlotId = null;
        let allSlots = [];
        
        // ============================================================
        // ================== منوی همبرگری ===========================
        // ============================================================
        function toggleMenu() {
            if (sidebar.classList.contains('open')) {
                sidebar.classList.remove('open');
                menuOverlay.classList.remove('active');
                document.body.style.overflow = '';
            } else {
                sidebar.classList.add('open');
                menuOverlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            }
        }
        
        if (menuToggleBtn) menuToggleBtn.addEventListener('click', toggleMenu);
        if (menuOverlay) menuOverlay.addEventListener('click', toggleMenu);
        
        // ============================================================
        // ================== خروج =====================================
        // ============================================================
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', () => {
                AuthAPI.logout();
            });
        }
        
        // ============================================================
        // ================== نام کاربر ==============================
        // ============================================================
        const usernameSpan = document.getElementById('username');
        if (usernameSpan) {
            usernameSpan.innerText = localStorage.getItem('username') || 'مشتری';
        }
        
        // ============================================================
        // ================== دریافت جزئیات سرویس ====================
        // ============================================================
        async function loadServiceDetail() {
            if (!serviceId) {
                showError('شناسه سرویس یافت نشد');
                return;
            }
            
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`http://127.0.0.1:8000/api/services/services/${serviceId}/`, {
                    headers: token ? { 'Authorization': `Bearer ${token}` } : {}
                });
                
                if (!response.ok) {
                    throw new Error('سرویس یافت نشد');
                }
                
                const service = await response.json();
                currentService = service;
                
                console.log('📥 اطلاعات سرویس:', service);
                
                // نمایش اطلاعات سرویس
                const serviceName = service.title || service.name || 'بدون نام';
                const providerName = service.provider_name || service.provider || 'نامشخص';
                const price = service.price || 0;
                const description = service.description || 'توضیحاتی برای این سرویس ثبت نشده است.';
                const categoryName = service.category_name || service.category || 'عمومی';
                
                let durationDisplay = 'نامشخص';
                if (service.duration_display) {
                    durationDisplay = service.duration_display;
                } else if (service.duration_minutes) {
                    const mins = service.duration_minutes;
                    const hours = Math.floor(mins / 60);
                    const minutes = mins % 60;
                    durationDisplay = hours > 0 ? `${hours} ساعت و ${minutes} دقیقه` : `${minutes} دقیقه`;
                }
                
                document.getElementById('serviceDetail').innerHTML = `
                    <div class="service-name">${serviceName}</div>
                    <div class="service-provider"><i class="fas fa-store"></i> ${providerName}</div>
                    <div class="service-price">${price.toLocaleString()} تومان</div>
                    <div class="service-description">${description}</div>
                    <div class="service-meta">
                        <div class="meta-item"><i class="fas fa-tag"></i> دسته‌بندی: ${categoryName}</div>
                        <div class="meta-item"><i class="fas fa-clock"></i> مدت زمان: ${durationDisplay}</div>
                    </div>
                `;
                
                document.getElementById('bookingSection').style.display = 'block';
                
                // ============================================================
                // ===== تنظیم تاریخ پیش‌فرض به 2026-06-29 (برای تست) =====
                // ============================================================
                const dateInput = document.getElementById('bookingDate');
                
                // بررسی کنید که آیا زمان‌هایی در سیستم وجود داره
                // و اولین تاریخ موجود رو به عنوان پیش‌فرض انتخاب کنید
                try {
                    const slotsResponse = await fetch(`http://127.0.0.1:8000/api/services/services/${serviceId}/available_slots/`, {
                        headers: token ? { 'Authorization': `Bearer ${token}` } : {}
                    });
                    const slotsData = await slotsResponse.json();
                    const slots = slotsData.results || slotsData || [];
                    
                    if (slots.length > 0) {
                        // پیدا کردن اولین تاریخ موجود
                        const firstSlot = slots.find(s => s.start_time);
                        if (firstSlot && firstSlot.start_time) {
                            const firstDate = new Date(firstSlot.start_time);
                            const year = firstDate.getFullYear();
                            const month = String(firstDate.getMonth() + 1).padStart(2, '0');
                            const day = String(firstDate.getDate()).padStart(2, '0');
                            dateInput.value = `${year}-${month}-${day}`;
                            console.log('📅 تاریخ پیش‌فرض از زمان‌ها:', dateInput.value);
                        }
                    } else {
                        // اگر هیچ زمانی موجود نبود، تاریخ امروز + 2 روز
                        const defaultDate = new Date();
                        defaultDate.setDate(defaultDate.getDate() + 2);
                        dateInput.value = defaultDate.toISOString().split('T')[0];
                        console.log('📅 تاریخ پیش‌فرض (پیش‌فرض):', dateInput.value);
                    }
                } catch (err) {
                    // در صورت خطا، تاریخ امروز + 2 روز
                    const defaultDate = new Date();
                    defaultDate.setDate(defaultDate.getDate() + 2);
                    dateInput.value = defaultDate.toISOString().split('T')[0];
                    console.log('📅 تاریخ پیش‌فرض (پیش‌فرض):', dateInput.value);
                }
                
                // بارگذاری زمان‌ها
                await loadTimeSlots();
                
            } catch(err) {
                showError('خطا در بارگذاری اطلاعات سرویس');
                console.error('❌ خطا:', err);
                document.getElementById('serviceDetail').innerHTML = `
                    <div style="text-align: center; padding: 40px; color: #EF4444;">
                        <i class="fas fa-exclamation-circle" style="font-size: 40px; display: block; margin-bottom: 15px;"></i>
                        خطا در بارگذاری اطلاعات سرویس
                    </div>
                `;
            }
        }
        
        // ============================================================
        // ================== دریافت زمان‌های قابل رزرو =============
        // ============================================================
        async function loadTimeSlots() {
            const dateInput = document.getElementById('bookingDate');
            const date = dateInput.value;
            
            if (!date) return;
            
            const slotsContainer = document.getElementById('timeSlots');
            slotsContainer.innerHTML = '<div class="no-slots">در حال بارگذاری...</div>';
            
            try {
                const token = localStorage.getItem('token');
                const url = `http://127.0.0.1:8000/api/services/services/${serviceId}/available_slots/`;
                
                console.log('📤 دریافت زمان‌ها از:', url);
                
                const response = await fetch(url, {
                    headers: token ? { 'Authorization': `Bearer ${token}` } : {}
                });
                
                if (!response.ok) {
                    throw new Error('خطا در دریافت زمان‌ها');
                }
                
                let slots = await response.json();
                
                if (slots.results) {
                    slots = slots.results;
                } else if (!Array.isArray(slots)) {
                    slots = [];
                }
                
                console.log('📥 زمان‌های دریافتی:', slots);
                allSlots = slots;
                
                // ===== فیلتر بر اساس تاریخ انتخاب شده =====
                const selectedDate = new Date(date);
                selectedDate.setHours(0, 0, 0, 0);
                
                const availableSlots = slots.filter(slot => {
                    if (!slot.start_time) return false;
                    
                    const slotDate = new Date(slot.start_time);
                    slotDate.setHours(0, 0, 0, 0);
                    
                    const isSameDate = slotDate.getTime() === selectedDate.getTime();
                    const isAvailable = slot.is_active !== false && !slot.is_booked;
                    
                    return isSameDate && isAvailable;
                });
                
                console.log('📅 زمان‌های تاریخ انتخاب شده:', availableSlots);
                console.log('📅 تاریخ انتخاب شده:', date);
                
                if (availableSlots.length > 0) {
                    availableSlots.sort((a, b) => {
                        return new Date(a.start_time) - new Date(b.start_time);
                    });
                    
                    slotsContainer.innerHTML = availableSlots.map(slot => {
                        const timeDisplay = toPersianTime(slot.start_time);
                        const dateDisplay = toPersianDate(slot.start_time);
                        
                        return `
                            <div class="time-slot" data-id="${slot.id}" onclick="selectSlot(${slot.id})" title="${dateDisplay} - ${timeDisplay}">
                                ${timeDisplay}
                            </div>
                        `;
                    }).join('');
                    selectedSlotId = null;
                } else {
                    slotsContainer.innerHTML = '<div class="no-slots">هیچ ساعتی برای این تاریخ موجود نیست</div>';
                }
                
            } catch(err) {
                console.error('❌ خطا:', err);
                slotsContainer.innerHTML = '<div class="no-slots">خطا در بارگذاری ساعات</div>';
                showError('خطا در بارگذاری ساعات');
            }
        }
        
        // ============================================================
        // ================== انتخاب زمان =============================
        // ============================================================
        window.selectSlot = (slotId) => {
            document.querySelectorAll('.time-slot').forEach(el => {
                el.classList.remove('selected');
            });
            const selectedEl = document.querySelector(`.time-slot[data-id="${slotId}"]`);
            if (selectedEl) {
                selectedEl.classList.add('selected');
                selectedSlotId = slotId;
            }
        };
        
        // ============================================================
        // ================== ثبت رزرو ================================
        // ============================================================
        document.getElementById('bookNowBtn').addEventListener('click', async () => {
            // ===== چک کردن لاگین بودن کاربر =====
            const token = localStorage.getItem('token');
            if (!token) {
                showError('لطفاً ابتدا وارد حساب کاربری خود شوید');
                setTimeout(() => {
                    window.location.href = '/login/';
                }, 1500);
                return;
            }
    
            if (!selectedSlotId) {
                showError('لطفاً یک ساعت را انتخاب کنید');
                return;
            }
    
            const selectedSlot = allSlots.find(s => s.id === selectedSlotId);
            if (!selectedSlot) {
                showError('زمان انتخاب شده یافت نشد');
                return;
            }
    
            if (selectedSlot.is_booked) {
                showError('این زمان قبلاً رزرو شده است');
                return;
            }
    
            // ===== غیرفعال کردن دکمه برای جلوگیری از کلیک مجدد =====
            const bookBtn = document.getElementById('bookNowBtn');
            bookBtn.disabled = true;
            bookBtn.textContent = 'در حال ثبت...';
    
            try {
                const result = await CustomerAPI.createBooking({
                    slotId: selectedSlotId,
                    note: ''
                });
        
                console.log('📥 نتیجه رزرو:', result);
        
                showSuccess('رزرو با موفقیت ثبت شد! در حال انتقال...');
        
                setTimeout(() => {
                    window.location.href = '/customer-bookings/';
                }, 2000);
        
            } catch(err) {
                console.error('❌ خطا:', err);
        
                // ===== اگر خطا 403 بود، کاربر رو به لاگین هدایت کن =====
                if (err.message.includes('اجازه') || err.message.includes('دسترسی')) {
                    showError('لطفاً دوباره وارد حساب کاربری خود شوید');
                    setTimeout(() => {
                        window.location.href = '/login/';
                    }, 2000);
                } else {
                    showError(err.message || 'خطا در ثبت رزرو');
                }
        
                // ===== فعال کردن مجدد دکمه =====
                bookBtn.disabled = false;
                bookBtn.textContent = 'ثبت رزرو';
            }
        });
        
        // ============================================================
        // ================== تغییر تاریخ =============================
        // ============================================================
        document.getElementById('bookingDate').addEventListener('change', () => {
            loadTimeSlots();
        });
        
        // ============================================================
        // ================== بارگذاری اولیه ==========================
        // ============================================================
        loadServiceDetail();
    </script>
</body>
</html>
