{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رزروهای من | سامانه مدیریت خدمات</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    
    <style>
        /* ===== استایل‌ها ===== */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 98;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .menu-overlay.active { opacity: 1; visibility: visible; }
        
        .sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: 70px;
            height: 100vh;
            background: rgba(8, 8, 12, 0.96);
            backdrop-filter: blur(16px);
            z-index: 99;
            border-left: 1px solid rgba(255, 255, 255, 0.06);
            transition: width 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: -8px 0 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        .sidebar.open { width: 240px; }
        
        .sidebar-header {
            padding: 24px 0 16px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: 20px;
        }
        
        .menu-toggle-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 10px 0;
            margin: 0 12px;
            color: rgba(255, 255, 255, 0.7);
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .menu-toggle-item i { font-size: 22px; width: 28px; text-align: center; }
        .menu-toggle-item .menu-text { font-size: 13px; font-weight: 500; display: none; letter-spacing: 0.3px; }
        .sidebar.open .menu-toggle-item { justify-content: flex-start; padding: 10px 16px; margin: 0 12px; }
        .sidebar.open .menu-toggle-item .menu-text { display: inline; }
        .menu-toggle-item:hover { background: rgba(255, 255, 255, 0.08); color: white; }
        
        .sidebar-menu { list-style: none; padding: 0; }
        .sidebar-menu li { margin: 4px 0; }
        .sidebar-menu a {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 10px 0;
            margin: 0 12px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            border-radius: 40px;
            transition: all 0.25s ease;
            white-space: nowrap;
            font-size: 14px;
            font-weight: 450;
        }
        .sidebar-menu a i { font-size: 22px; width: 28px; text-align: center; }
        .sidebar-menu a .menu-text { display: none; font-size: 13px; }
        .sidebar.open .sidebar-menu a { justify-content: flex-start; padding: 10px 16px; margin: 0 12px; }
        .sidebar.open .sidebar-menu a .menu-text { display: inline; }
        .sidebar-menu a:hover { background: rgba(255, 255, 255, 0.06); color: white; }
        .sidebar-menu a.active { background: rgba(37, 99, 235, 0.15); color: white; }
        .sidebar-menu a.active i { background: #2563EB; color: white; border-radius: 50%; padding: 6px; width: 34px; margin-right: -3px; }
        .sidebar.open .sidebar-menu a.active i { margin-right: 0; }
        
        .main-content {
            margin-right: 70px;
            padding: 24px 32px;
            min-height: 100vh;
            transition: margin-right 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        .page-title { color: white; font-size: 26px; font-weight: 600; letter-spacing: -0.3px; }
        
        .user-info { display: flex; align-items: center; gap: 16px; }
        .user-name { color: rgba(255, 255, 255, 0.85); font-weight: 500; font-size: 14px; }
        
        .btn-icon {
            background: rgba(255, 255, 255, 0.06);
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
            padding: 8px 12px;
            border-radius: 30px;
            transition: all 0.2s;
        }
        .btn-icon:hover { background: rgba(255, 255, 255, 0.12); color: white; }
        
        .bookings-container {
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 20px;
        }
        
        .bookings-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .booking-card {
            background: #F9FAFB;
            border-radius: 16px;
            padding: 18px;
            transition: all 0.2s;
            border-right: 4px solid #2563EB;
        }
        .booking-card:hover { background: #F3F4F6; }
        .booking-card.status-pending { border-right-color: #D97706; }
        .booking-card.status-confirmed { border-right-color: #059669; }
        .booking-card.status-canceled { border-right-color: #6B7280; }
        .booking-card.status-rejected { border-right-color: #DC2626; }
        .booking-card.status-completed { border-right-color: #2563EB; }
        
        .booking-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        
        .service-name {
            font-weight: 700;
            color: #1F2937;
            font-size: 16px;
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-pending { background: #FEF3C7; color: #D97706; }
        .status-confirmed { background: #D1FAE5; color: #059669; }
        .status-canceled { background: #F3F4F6; color: #6B7280; }
        .status-rejected { background: #FEE2E2; color: #DC2626; }
        .status-completed { background: #DBEAFE; color: #2563EB; }
        
        .booking-details {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin: 10px 0;
            font-size: 13px;
            color: #6B7280;
        }
        .booking-details span { display: flex; align-items: center; gap: 6px; }
        
        .booking-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        
        .btn-cancel {
            background: #EF4444;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .btn-cancel:hover { background: #DC2626; }
        .btn-cancel:disabled { background: #9CA3AF; cursor: not-allowed; }
        
        .btn-pay {
            background: #10B981;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .btn-pay:hover { background: #059669; }
        
        .btn-invoice {
            background: #2563EB;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .btn-invoice:hover { background: #1D4ED8; }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #6B7280;
        }
        
        @media (max-width: 800px) {
            .main-content { margin-right: 0; padding: 16px; }
            .sidebar { right: -70px; }
            .sidebar.open { right: 0; }
            .booking-details { gap: 10px; flex-direction: column; }
            .booking-actions { flex-direction: column; }
            .booking-actions button { width: 100%; }
        }
    </style>
</head>
<body>
    <header class="glass-header">
        <div class="header-title">سامانه مدیریت خدمات</div>
    </header>
    
    <div class="menu-overlay" id="menuOverlay"></div>
    
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="menu-toggle-item" id="menuToggleBtn">
                <i class="fas fa-bars"></i>
                <span class="menu-text">منو</span>
            </div>
        </div>
        <ul class="sidebar-menu">
            <li><a href="/customer-services/"><i class="fas fa-search"></i><span class="menu-text"> جستجوی خدمات</span></a></li>
            <li><a href="/customer-bookings/" class="active"><i class="fas fa-calendar-check"></i><span class="menu-text"> رزروهای من</span></a></li>
            <li><a href="/customer-profile/"><i class="fas fa-user"></i><span class="menu-text"> پروفایل</span></a></li>
        </ul>
    </div>
    
    <div class="main-content">
        <div class="dashboard-header">
            <h1 class="page-title">رزروهای من</h1>
            <div class="user-info">
                <span class="user-name" id="username">مشتری</span>
                <button class="btn-icon" id="logoutBtn" title="خروج"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
        
        <div class="bookings-container">
            <div id="bookingsList" class="bookings-grid">
                <div class="empty-state">در حال بارگذاری...</div>
            </div>
        </div>
    </div>
    
    <script src="{% static 'js/api.js' %}"></script>
    <script>
        function toPersianDate(dateString) {
            if (!dateString) return 'نامشخص';
            try {
                const date = new Date(dateString);
                if (isNaN(date.getTime())) return 'نامشخص';
                return date.toLocaleDateString('fa-IR', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit'
                });
            } catch(e) {
                return 'نامشخص';
            }
        }
        
        function toPersianTime(dateString) {
            if (!dateString) return 'نامشخص';
            try {
                const date = new Date(dateString);
                if (isNaN(date.getTime())) return 'نامشخص';
                return date.toLocaleTimeString('fa-IR', {
                    hour: '2-digit',
                    minute: '2-digit'
                });
            } catch(e) {
                return 'نامشخص';
            }
        }
        
        function toPersianDateTime(dateString) {
            if (!dateString) return 'نامشخص';
            try {
                const date = new Date(dateString);
                if (isNaN(date.getTime())) return 'نامشخص';
                return date.toLocaleDateString('fa-IR', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            } catch(e) {
                return 'نامشخص';
            }
        }
        
        const sidebar = document.getElementById('sidebar');
        const menuOverlay = document.getElementById('menuOverlay');
        const menuToggleBtn = document.getElementById('menuToggleBtn');
        
        function toggleMenu() {
            if (sidebar.classList.contains('open')) {
                sidebar.classList.remove('open');
                menuOverlay.classList.remove('active');
                document.body.style.overflow = '';
            } else {
                sidebar.classList.add('open');
                menuOverlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            }
        }
        
        if (menuToggleBtn) menuToggleBtn.addEventListener('click', toggleMenu);
        if (menuOverlay) menuOverlay.addEventListener('click', toggleMenu);
        
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', () => {
                AuthAPI.logout();
            });
        }
        
        const usernameSpan = document.getElementById('username');
        if (usernameSpan) {
            usernameSpan.innerText = localStorage.getItem('username') || 'مشتری';
        }
        
        const statusMap = {
            'pending': 'در انتظار',
            'confirmed': 'تایید شده',
            'rejected': 'رد شده',
            'canceled': 'لغو شده',
            'completed': 'انجام شده'
        };
        
        const statusClass = {
            'pending': 'status-pending',
            'confirmed': 'status-confirmed',
            'rejected': 'status-rejected',
            'canceled': 'status-canceled',
            'completed': 'status-completed'
        };
        
        async function loadBookings() {
            const container = document.getElementById('bookingsList');
            
            try {
                const bookings = await CustomerAPI.getMyBookings();
                console.log('📥 رزروهای دریافتی:', bookings);
                
                let bookingsList = bookings;
                if (bookings.results) {
                    bookingsList = bookings.results;
                } else if (!Array.isArray(bookings)) {
                    bookingsList = [];
                }
                
                if (bookingsList && bookingsList.length > 0) {
                    container.innerHTML = bookingsList.map(booking => {
                        console.log('📋 رزرو:', booking);
                        
                        const serviceTitle = booking.service_title || booking.serviceName || 'بدون نام';
                        const providerName = booking.provider_name || booking.providerName || 'نامشخص';
                        const price = booking.price_at_booking || booking.price || 0;
                        const status = booking.status || 'pending';
                        const statusText = statusMap[status] || status;
                        const statusCls = statusClass[status] || 'status-pending';
                        
                        let dateDisplay = 'نامشخص';
                        let timeDisplay = 'نامشخص';
                        
                        if (booking.time_slot_start) {
                            dateDisplay = toPersianDate(booking.time_slot_start);
                            timeDisplay = toPersianTime(booking.time_slot_start);
                        } else if (booking.start_time) {
                            dateDisplay = toPersianDate(booking.start_time);
                            timeDisplay = toPersianTime(booking.start_time);
                        } else if (booking.date) {
                            dateDisplay = toPersianDate(booking.date);
                            timeDisplay = toPersianTime(booking.date);
                        }
                        
                        const canCancel = booking.can_cancel === true;
                        const canPay = booking.can_pay === true;
                        const isPaid = booking.payment_status === 'paid';
                        const isCanceled = status === 'canceled';
                        const isCompleted = status === 'completed';
                        
                        const bookingDateDisplay = booking.booking_date ? toPersianDateTime(booking.booking_date) : '';
                        
                        return `
                            <div class="booking-card status-${status}">
                                <div class="booking-header">
                                    <span class="service-name">${serviceTitle}</span>
                                    <span class="status-badge ${statusCls}">${statusText}</span>
                                </div>
                                <div class="booking-details">
                                    <span><i class="fas fa-store"></i> ${providerName}</span>
                                    <span><i class="fas fa-calendar"></i> ${dateDisplay}</span>
                                    <span><i class="fas fa-clock"></i> ${timeDisplay}</span>
                                    <span><i class="fas fa-credit-card"></i> ${Number(price).toLocaleString()} تومان</span>
                                    <span><i class="fas fa-${isPaid ? 'check-circle' : 'hourglass-half'}"></i> ${isPaid ? 'پرداخت شده' : 'پرداخت نشده'}</span>
                                    ${bookingDateDisplay ? `<span><i class="fas fa-calendar-plus"></i> ${bookingDateDisplay}</span>` : ''}
                                </div>
                                <div class="booking-actions">
                                    ${canCancel && !isCanceled && !isCompleted ? `
                                        <button class="btn-cancel" onclick="cancelBooking(${booking.id})">
                                            <i class="fas fa-times"></i> لغو رزرو
                                        </button>
                                    ` : ''}
                                    
                                    ${canPay && status === 'confirmed' ? `
                                        <button class="btn-pay" onclick="payBooking(${booking.id}, ${Number(price)})">
                                            <i class="fas fa-credit-card"></i> پرداخت
                                        </button>
                                    ` : ''}
                                    
                                    ${isPaid ? `
                                        <button class="btn-invoice" onclick="downloadInvoice(${booking.id})">
                                            <i class="fas fa-file-pdf"></i> فاکتور
                                        </button>
                                    ` : ''}
                                </div>
                            </div>
                        `;
                    }).join('');
                } else {
                    container.innerHTML = '<div class="empty-state">هیچ رزروی یافت نشد</div>';
                }
            } catch(err) {
                console.error('❌ خطا:', err);
                container.innerHTML = `
                    <div class="empty-state" style="color: #EF4444;">
                        <i class="fas fa-exclamation-circle" style="font-size: 40px; display: block; margin-bottom: 15px;"></i>
                        خطا در بارگذاری رزروها
                        <br>
                        <span style="font-size: 12px; color: #9CA3AF;">${err.message}</span>
                    </div>
                `;
            }
        }
        
        window.cancelBooking = async (id) => {
            if (confirm('آیا از لغو این رزرو اطمینان دارید؟')) {
                try {
                    await CustomerAPI.cancelBooking(id);
                    showSuccess('رزرو با موفقیت لغو شد');
                    await loadBookings();
                } catch(err) {
                    showError(err.message || 'خطا در لغو رزرو');
                }
            }
        };
        
        window.payBooking = (id, amount) => {
            window.location.href = `/customer-payment/?bookingId=${id}&amount=${amount}`;
        };
        
        window.downloadInvoice = async (id) => {
            try {
                const blob = await CustomerAPI.getInvoicePDF(id);
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `invoice_${id}.pdf`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);
            } catch(err) {
                showError(err.message || 'خطا در دانلود فاکتور');
            }
        };
        
        loadBookings();
    </script>
</body>
</html>
